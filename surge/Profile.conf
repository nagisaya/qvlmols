[URL Rewrite]
# Redirect Google Search Service
^https?://(www.)?g.cn https://www.google.com 302
^https?://(www.)?google.cn https://www.google.com 302

[Header Rewrite]
# 解除 Github 429 限制
http-request (raw|gist).githubusercontent.com header-replace Accept-Language en-us

[Body Rewrite]
http-response-jq ^https:\/\/rec\.xiaohongshu\.com\/api\/sns\/v\d+\/homefeed "'.data |= map(select((((.recommend.type" // "") == "hot_reason") or ((.recommend.desc // "") == "热点") or (((.recommend.track_id // "") | test("(^|_)hotspot|hotspoti2i"; "i"))) or (((.rec_extra_info // "") | test("\"hotEventId\"")))) | not))'

