TWN = smart, include-other-group=ALL, policy-regex-filter=(🇹🇼)|(🇨🇳)|(台湾)|(Tai)|(TW), interval=600, tolerance=100, evaluate-before-use=true, hidden=1, no-alert=1, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/nagisaya/qvlmols/refs/heads/main/icons/flg_tw.png
HKG = smart, include-other-group=ALL, policy-regex-filter=(🇭🇰)|(香港)|(Hong)|(HK), interval=600, tolerance=100, evaluate-before-use=true, hidden=1, no-alert=1, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/nagisaya/qvlmols/refs/heads/main/icons/flg_hk.png
USA = smart, include-other-group=ALL, policy-regex-filter=(🇺🇸)|(美国)|(States)|(US), interval=600, tolerance=100, evaluate-before-use=true, hidden=1, no-alert=1, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/nagisaya/qvlmols/refs/heads/main/icons/flg_usa.png
