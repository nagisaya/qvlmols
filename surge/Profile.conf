IND = smart, include-other-group=ALL, policy-regex-filter=(🇮🇳)|(印度)|(India)|(IN), interval=600, tolerance=100, evaluate-before-use=true, hidden=1, no-alert=1, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/nagisaya/qvlmols/refs/heads/main/icons/flg_in.png
FRA = smart, include-other-group=ALL, policy-regex-filter=(🇫🇷)|(法国)|(France)|(FR), interval=600, tolerance=100, evaluate-before-use=true, hidden=1, no-alert=1, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/nagisaya/qvlmols/refs/heads/main/icons/flg_fr.png
JPN = smart, include-other-group=ALL, policy-regex-filter=(🇯🇵)|(日本)|(Japan)|(JP), interval=600, tolerance=100, evaluate-before-use=true, hidden=1, no-alert=1, include-all-proxies=0, icon-url=https://raw.githubusercontent.com/nagisaya/qvlmols/refs/heads/main/icons/flg_jp.png

